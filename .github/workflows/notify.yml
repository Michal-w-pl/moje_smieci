name: PGK Radomsko notifier

on:
  schedule:
    - cron: '5 18 * * *'
      timezone: 'Europe/Warsaw'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Data testowa YYYY-MM-DD. Skrypt sprawdzi odbiór dla następnego dnia.'
        required: false
        type: string
      dry_run:
        description: 'Tylko pokaż mail w logach, bez wysyłki'
        required: false
        default: false
        type: boolean

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show selected mode
        run: |
          echo "target_date=${{ inputs.target_date }}"
          echo "dry_run=${{ inputs.dry_run }}"

      - name: Run notifier
        env:
          STREET_NAME: ${{ secrets.STREET_NAME }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          TARGET_DATE: ${{ inputs.target_date }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python app.py --dry-run
          else
            python app.py
          fi
